openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pattern Engine API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Account created, OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPendingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OTP sent for 2FA verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPendingResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"
        "403":
          description: Account locked or unverified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPendingResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInput"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"

  /auth/resend-otp:
    post:
      operationId: resendOtp
      tags: [auth]
      summary: Resend OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpInput"
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpResendResult"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Send OTP for password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: OTP sent to email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPendingResponse"
        "404":
          description: Email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with permit token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleMessage"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"
        "403":
          description: Invalid reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorDetail"

  /auth/mail-catcher:
    get:
      operationId: getMailCatcher
      tags: [auth]
      summary: Get developer mail catcher emails
      responses:
        "200":
          description: List of captured emails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailCatcherResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SignupInput:
      type: object
      required: [name, email, password, confirmPassword]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        confirmPassword:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean

    VerifyOtpInput:
      type: object
      required: [email, otp, purpose]
      properties:
        email:
          type: string
        otp:
          type: string
        purpose:
          type: string
          enum: [signup, login_2fa, forgot_password]

    ResendOtpInput:
      type: object
      required: [email, purpose]
      properties:
        email:
          type: string
        purpose:
          type: string
          enum: [signup, login_2fa, forgot_password]

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ResetPasswordInput:
      type: object
      required: [email, resetPermitToken, newPassword, confirmPassword]
      properties:
        email:
          type: string
        resetPermitToken:
          type: string
        newPassword:
          type: string
        confirmPassword:
          type: string

    AuthPendingResponse:
      type: object
      properties:
        message:
          type: string
        email:
          type: ["string", "null"]
        purpose:
          type: ["string", "null"]
        requiresValidation:
          type: ["boolean", "null"]
      required:
        - message

    AuthSuccessResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: ["string", "null"]
        resetPermitToken:
          type: ["string", "null"]
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - message

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
        - email

    MeResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
            role:
              type: string
            verified:
              type: boolean
          required: [id, name, email, role, verified]
      required:
        - user

    OtpResendResult:
      type: object
      properties:
        message:
          type: string
        cooldown:
          type: integer
      required:
        - message

    SimpleMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ApiErrorDetail:
      type: object
      properties:
        message:
          type: string
        failedRules:
          type: array
          items:
            type: string
      required:
        - message

    CapturedEmail:
      type: object
      properties:
        id:
          type: string
        to:
          type: string
        subject:
          type: string
        body:
          type: string
        otp:
          type: string
        timestamp:
          type: string
      required: [id, to, subject, body, otp, timestamp]

    MailCatcherResponse:
      type: object
      properties:
        emails:
          type: array
          items:
            $ref: "#/components/schemas/CapturedEmail"
      required:
        - emails
